# NGINX Load Balancer for Qwen3-Embedding-8B
# Distributes embedding requests across multiple inference instances.
#
# Usage:
#   1. Edit the 'server' lines below to match your deployment nodes/ports
#   2. Start nginx: docker run -d --name embedding-lb -p 8090:8090 \
#        -v $(pwd)/nginx-lb.conf:/etc/nginx/conf.d/default.conf nginx
#
# For single-node: list localhost:8081, localhost:8082, etc.
# For multi-node:  list each node's IP:port.

upstream embedding_servers {
    zone embedding_zone 64k;
    least_conn;

    # --- Edit these to match your deployment ---
    server localhost:8081;
    server localhost:8082;

    keepalive 16;
    keepalive_requests 100;
}

server {
    listen 8090;
    server_name _;

    location /health {
        proxy_pass http://embedding_servers/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /embed {
        proxy_pass http://embedding_servers/embed;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://embedding_servers/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
