version: "3.8"

# ISMA Demo Stack
# Runs Weaviate + Redis for local demo with kernel-layer_1 corpus
# Full production setup requires Qwen3-Embedding-8B server (see README)

services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.32.23
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_API_BASED_MODULES: "true"
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: on-failure

volumes:
  weaviate_data:
